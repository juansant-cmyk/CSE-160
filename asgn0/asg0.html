<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <br>

    v1: x <input type="number" id="v1x">
    y <input type="number" id="v1y">
    <br>

    v2: x <input type="number" id="v2x">
    y <input type="number" id="v2y">
    <br>

    <button type="button" onclick="handleDrawEvent()">Draw</button>
    <br><br>

    Operation:
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="angle">Angle between</option>
      <option value="area">Area of triangle</option>
    </select>

    Scalar:
    <input type="number" id="scalar">
    <button type="button" onclick="handleDrawOperationEvent()">Draw</button>

    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
